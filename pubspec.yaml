name: musicplayer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.6.0
  glassmorphism: ^3.0.0
  cached_network_image: ^3.4.1
  audio_session: ^0.2.3
  # Kept as rollback dependencies until Media3 parity is validated on Android 11 / MIUI 12.
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.3
  rxdart: ^0.28.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/play_store_512.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/play_store_512.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/search/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/regular.otf
        - asset: assets/fonts/medium.otf
          weight: 500
        - asset: assets/fonts/bold.otf
          weight: 700
