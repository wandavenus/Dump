name: musicplayer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  text_scroll: ^0.2.1
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  cached_network_image: ^3.4.1
  audio_session: ^0.2.3
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.3
  rxdart: ^0.28.0
  path: ^1.9.0
  path_provider: ^2.1.5
  scrollable_positioned_list: ^0.3.8
  
  media_kit: ^1.2.6
  media_kit_libs_android_audio: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/play_store_512.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/play_store_512.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/search/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/regular.otf
        - asset: assets/fonts/medium.otf
          weight: 500
        - asset: assets/fonts/bold.otf
          weight: 700
