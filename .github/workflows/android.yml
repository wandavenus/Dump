name: android build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        
   
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: cache pub
        uses: actions/cache@v6
        with:
           path: ~/.pub-cache
           key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
           restore-keys: |
                ${{ runner.os }}-pub-

      - run: flutter pub get

      - name: Patch media_kit (arm64 only)
        run: |
            FILE=$(find "$PUB_CACHE" -path "*/media_kit_libs_android_audio-*/android/build.gradle" | head -n1)
            python3 <<'PY' "$FILE"
            import sys

            path = sys.argv[1]

            with open(path, "r", encoding="utf-8") as f:
            text = f.read()

            old = """        filesToDownload.each { fileInfo ->
            """

            new = """        filesToDownload.each { fileInfo ->
            if (!fileInfo.url.contains("arm64-v8a")) {
                return
            }
            """

            if old not in text:
            raise Exception("Patch target not found")

            text = text.replace(old, new, 1)

             with open(path, "w", encoding="utf-8") as f:
             f.write(text)

             print("Patched:", path)
              PY
      
      - run: flutter build apk --release --target-platform android-arm64 --no-pub

      - name: upload artifact apk
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error 
          compression-level: 0    
          archive: false
