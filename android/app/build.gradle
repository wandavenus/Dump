plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// 🌟 SUNTIKAN SAKTI: Paksa Gradle buat nolak download jar media-kit selain arm64!
configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'com.github.media-kit') {
            // Kalau namanya mengandung unsur v7a, x86, atau x86_64, kita potong jalurnya
            if (details.requested.name.contains('armeabi-v7a') || 
                details.requested.name.contains('x86')) {
                details.useTarget("com.github.media-kit:libmpv-android-audio-build:v1.1.8") 
            }
        }
    }
}

android {
    namespace "com.example.musicplayer"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    lint {
        baseline = file("lint-baseline.xml")
        abortOnError false // 🌟 Cari aman beb, biar build di GitHub gak gampang jebol gara-gara warning lint kecil
        warningsAsErrors = false
        checkDependencies = false
        xmlReport = true
        htmlReport = true
    }

    testOptions {
        unitTests {
            returnDefaultValues = true
        }
    }

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.example.musicplayer"
        minSdk 29
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        ndk {
            abiFilters "arm64-v8a" // 🌟 Tetap dikunci di arm64
        }
    }

    packaging {
        resources {
            excludes += [
                "META-INF/LICENSE*",
                "META-INF/NOTICE*",
                "META-INF/DEPENDENCIES",
                "META-INF/*.version",
                "META-INF/AL2.0",
                "META-INF/LGPL2.1"
            ]
        }
        // 🌟 Jaga-jaga tingkat dewa biar binary arsitektur lain gak ikut ke-pack ke APK
        jniLibs {
            excludes += [
                'lib/armeabi-v7a/**',
                'lib/x86/**',
                'lib/x86_64/**'
            ]
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            crunchPngs true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.media3:media3-exoplayer:1.10.1'
    implementation 'androidx.media3:media3-session:1.10.1'
    implementation 'androidx.media3:media3-ui:1.10.1'
    implementation 'androidx.media3:media3-extractor:1.10.1'
    implementation 'androidx.media3:media3-container:1.10.1'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.jetbrains.kotlin:kotlin-test-junit:1.9.23'
    testImplementation 'org.mockito:mockito-core:5.3.1'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:5.1.0'
}
